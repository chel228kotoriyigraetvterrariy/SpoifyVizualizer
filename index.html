<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Spotify Visualizer</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #login-screen { text-align: center; }
        #login-button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #1DB954; border: none; border-radius: 50px; color: white; }
    </style>
    
    <script>
        window.onSpotifyWebPlaybackSDKReady = () => {
            console.log("SDK готов к инициализации");
            const token = localStorage.getItem('spotify_token');
            if (token) {
                initializePlayer(token);
            }
        };
    </script>

    <script src="https://sdk.scdn.co/spotify-player.js"></script>
</head>
<body>

    <div id="login-screen">
        <button id="login-button">Войти в Spotify</button>
    </div>
    
    <div id="app" style="display:none;">
        <canvas id="visualizer" width="800" height="400" style="background: #000;"></canvas>
    </div>

    <script>
        const CLIENT_ID = 'ВАШ_CLIENT_ID_СЮДА'; // ВСТАВЬ СЮДА СВОЙ ID
        const REDIRECT_URI = 'https://chel228kotoriyigraetvterrariy.github.io/SpoifyVizualizer/';

        // Логика авторизации
        document.getElementById('login-button').onclick = () => {
            // ВАЖНО: Сейчас лучше использовать Implicit Grant, если нет бэкенда,
            // но Spotify требует смены на 'code'. Для простых пет-проектов 
            // пока можно попробовать вернуть 'token' в URL, если не сработает - 
            // нужно будет писать серверную часть.
            const authUrl = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=streaming%20user-read-email%20user-read-private`;
            window.location.href = authUrl;
        };

        // Проверка токена из URL
        function checkAuth() {
            const hash = window.location.hash.substring(1).split('&').reduce((acc, item) => {
                const [key, value] = item.split('=');
                acc[key] = value;
                return acc;
            }, {});

            if (hash.access_token) {
                localStorage.setItem('spotify_token', hash.access_token);
                window.history.replaceState({}, document.title, window.location.pathname); // Чистим URL
                return hash.access_token;
            }
            return localStorage.getItem('spotify_token');
        }

        // Инициализация плеера
        function initializePlayer(token) {
            const player = new Spotify.Player({
                name: 'Web Visualizer',
                getOAuthToken: cb => { cb(token); },
                volume: 0.5
            });

            player.addListener('ready', ({ device_id }) => {
                console.log('Ready with Device ID', device_id);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                requestAnimationFrame(renderLoop);
            });

            player.addListener('player_state_changed', state => {
                console.log("Состояние плеера:", state);
            });

            player.connect();
        }

        function renderLoop() {
            // Здесь ваша логика рисования
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#1DB954';
            ctx.fillRect(10, 10, 50, 50); // Тестовый квадрат
            requestAnimationFrame(renderLoop);
        }

        // Запуск
        const token = checkAuth();
        if (token) {
            console.log("Токен найден, запускаем...");
            // Если SDK загрузился до выполнения этого кода, вызываем сразу
            if (window.Spotify) {
                initializePlayer(token);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Spotify Auth Fix</title>
</head>
<body>
    <button id="login">Войти через Spotify</button>

    <script>
        const CLIENT_ID = 'ТВОЙ_CLIENT_ID'; // Вставь сюда
        const REDIRECT_URI = 'https://chel228kotoriyigraetvterrariy.github.io/SpoifyVizualizer/';

        // 1. Генерируем PKCE
        function generateRandomString(length) {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            return Array.from({length}, () => possible.charAt(Math.floor(Math.random() * possible.length))).join('');
        }

        async function generateCodeChallenge(verifier) {
            const encoder = new TextEncoder();
            const data = encoder.encode(verifier);
            const digest = await window.crypto.subtle.digest('SHA-256', data);
            return btoa(String.fromCharCode(...new Uint8Array(digest)))
                .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        // 2. Нажатие кнопки
        document.getElementById('login').onclick = async () => {
            const verifier = generateRandomString(128);
            localStorage.setItem('verifier', verifier);
            const challenge = await generateCodeChallenge(verifier);
            
            const params = new URLSearchParams({
                client_id: CLIENT_ID,
                response_type: 'code',
                redirect_uri: REDIRECT_URI,
                code_challenge_method: 'S256',
                code_challenge: challenge,
                scope: 'user-read-currently-playing' // Для не-премиум этого достаточно
            });
            window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
        };

        // 3. Обмен кода на токен (после редиректа)
        async function getToken(code) {
            const verifier = localStorage.getItem('verifier');
            const res = await fetch('https://accounts.spotify.com/api/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    client_id: CLIENT_ID,
                    grant_type: 'authorization_code',
                    code: code,
                    redirect_uri: REDIRECT_URI,
                    code_verifier: verifier
                })
            });
            const data = await res.json();
            if (data.access_token) {
                console.log("Токен получен:", data.access_token);
                // Твой код визуализатора запускается здесь
            }
        }

        // Автозапуск при возврате с сайта Spotify
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        if (code) getToken(code);
    </script>
</body>
</html>

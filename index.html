<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Spotify Visualizer</title>
</head>
<body>
    <div id="login-screen">
        <button id="login-button">Войти в Spotify</button>
    </div>
    <div id="app" style="display:none;">
        <canvas id="visualizer" width="500" height="300" style="background:#000;"></canvas>
    </div>

    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script>
        // --- НАСТРОЙКИ ---
        const CLIENT_ID = '9c69b7f62c114fa09cf8caf9d3d4b526'; // Вставь сюда свой ID
        const REDIRECT_URI = 'https://chel228kotoriyigraetvterrariy.github.io/SpoifyVizualizer/';
        // -----------------

        const loginButton = document.getElementById('login-button');

        // Логика кнопки входа
        loginButton.onclick = () => {
            // МЫ ПЫТАЕМСЯ token. Если будет ошибка "must be code", 
            // значит твое приложение в панели Spotify жестко настроено на бэкенд.
            const url = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=streaming%20user-read-email%20user-read-private`;
            window.location.href = url;
        };

        // Извлекаем токен из URL
        const hash = window.location.hash.substring(1).split('&').reduce((initial, item) => {
            if (item) {
                var parts = item.split('=');
                initial[parts[0]] = decodeURIComponent(parts[1]);
            }
            return initial;
        }, {});
        
        window.location.hash = '';
        const token = hash.access_token;

        // Если токен есть, запускаем плеер
        if (token) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            
            window.onSpotifyWebPlaybackSDKReady = () => {
                const player = new Spotify.Player({
                    name: 'Web Visualizer',
                    getOAuthToken: cb => { cb(token); },
                    volume: 0.5
                });

                player.addListener('ready', ({ device_id }) => {
                    console.log('Готово! Device ID:', device_id);
                });

                player.addListener('authentication_error', ({ message }) => {
                    console.error('Ошибка авторизации:', message);
                });

                player.connect();
            };
        }
    </script>
</body>
</html>

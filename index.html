<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Spotify Visualizer</title>
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
</head>
<body>

    <div id="login-screen">
        <button id="login-button">Войти в Spotify</button>
    </div>
    
    <div id="app" style="display:none;">
        <canvas id="visualizer"></canvas>
    </div>

    <script>
        // 1. Глобальные переменные
        let player;
        let audioState = { playing: false, track: null };

        // 2. Функция, которую ОБЯЗАТЕЛЬНО требует Spotify SDK
        window.onSpotifyWebPlaybackSDKReady = () => {
            console.log("SDK загружен. Инициализация плеера...");
            
            // Здесь мы создаем плеер. 
            // Токен нужно получить заранее (или через серверную авторизацию)
            const token = "ТВОЙ_АКТУАЛЬНЫЙ_ТОКЕН"; 
            
            player = new Spotify.Player({
                name: 'Web Visualizer',
                getOAuthToken: cb => { cb(token); },
                volume: 0.5
            });

            // Слушатели событий
            player.addListener('ready', ({ device_id }) => {
                console.log('Ready with Device ID', device_id);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                
                // ЗАПУСК РЕНДЕРИНГА ТОЛЬКО ЗДЕСЬ
                requestAnimationFrame(renderLoop);
            });

            player.addListener('player_state_changed', state => {
                if (!state) return;
                audioState.playing = !state.paused;
                audioState.track = state.track_window.current_track;
                console.log("Статус изменен:", state);
            });

            player.connect();
        };

        // 3. Твой цикл рендеринга
        function renderLoop() {
            // Если нужно, проверка на паузу
            if (audioState.playing) {
                // Твоя логика рисования canvas
                // console.log("Рисуем...");
            }
            
            requestAnimationFrame(renderLoop);
        }

        // 4. Логика авторизации
        // Замени 'checkAuth' на полноценную функцию, 
        // которая достает токен из URL (после редиректа)
        function checkAuth() {
            const hash = window.location.hash
                .substring(1)
                .split('&')
                .reduce((initial, item) => {
                    let parts = item.split('=');
                    initial[parts[0]] = decodeURIComponent(parts[1]);
                    return initial;
                }, {});
            
            if (hash.access_token) {
                return hash.access_token;
            }
            return null;
        }

        // Запуск проверки
        const token = checkAuth();
        if (token) {
            // Если токен есть, принудительно вызываем инициализацию, 
            // если SDK не подхватил автоматически
            console.log("Токен найден!");
        } else {
            console.log("Токен не найден. Требуется логин.");
        }
    </script>
</body>
</html>
